<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="binGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#199E10" />
      <stop offset="100%" stop-color="#094A04" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#033804" />
      <stop offset="50%" stop-color="#34C41B" />
      <stop offset="100%" stop-color="#73F11E" />
    </linearGradient>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1CB612" />
      <stop offset="100%" stop-color="#14830C" />
    </linearGradient>
  </defs>
  
  <!-- Bin Body -->
  <path d="M 23 35 L 28 85 C 28 92 35 95 50 95 C 65 95 72 92 72 85 L 77 35 Z" fill="url(#binGrad)" />
  
  <!-- Bin Grooves -->
  <path d="M 32 45 L 35 80" stroke="#48B722" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 41 45 L 43 82" stroke="#48B722" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 50 45 L 50 83" stroke="#48B722" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 59 45 L 57 82" stroke="#48B722" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M 68 45 L 65 80" stroke="#48B722" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Lid shadow/lip -->
  <rect x="23" y="35" width="54" height="4" fill="#0A3F03" opacity="0.5" />
  
  <!-- Lid -->
  <rect x="18" y="24" width="64" height="11" rx="5" fill="url(#lidGrad)" />
  <!-- Handle -->
  <path d="M 40 24 L 40 18 C 40 13 60 13 60 18 L 60 24" fill="none" stroke="url(#lidGrad)" stroke-width="5" stroke-linecap="round" />
  <path d="M 43 24 L 43 19 C 43 16 57 16 57 19 L 57 24" fill="none" stroke="#87F52F" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Dynamic Leaf Swoosh -->
  <path d="M 15 65 C 10 90 40 95 60 75 C 80 55 90 35 83 30 C 75 45 45 80 30 70 C 20 62 18 50 25 40 C 15 48 10 55 15 65 Z" fill="url(#leafGrad)" />
  
  <!-- Leaf internal vein -->
  <path d="M 28 65 C 45 60 65 45 80 33" fill="none" stroke="#DCFCCC" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 50 54 L 60 48" fill="none" stroke="#DCFCCC" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 63 43 L 73 38" fill="none" stroke="#DCFCCC" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Sparkle -->
  <path d="M 85 30 Q 90 30 90 23 Q 90 30 97 30 Q 90 30 90 37 Q 90 30 85 30 Z" fill="#9AEB13" />
</svg>
